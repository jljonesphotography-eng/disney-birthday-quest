<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Captain Quest</title>

<style>

body{
background:#0c0907;
color:#f5c842;
font-family:Georgia;
text-align:center;
padding:20px;
}

.card{
background:#1c1611;
border:1px solid #f5c842;
border-radius:12px;
padding:20px;
margin:20px;
}

button{
padding:12px;
margin:8px;
background:#f5c842;
border:none;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#d6a925;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h1>👑 Birthday Captain's Quest</h1>

<div id="mission1" class="card">
<h2>Mission 1</h2>
<p>Tower of Terror</p>

<button onclick="shortWait()">Wait is Short</button>
<button onclick="longWait()">Wait is Long</button>

</div>

<div id="mission2" class="card hidden">
<h2>Next Stop</h2>
<p>Slinky Dog Dash</p>

<button onclick="finish()">Mission Complete</button>
</div>

<div id="snack1" class="card hidden">
<h2>Snack Stop</h2>
<p>Totchos at Woody's Lunch Box</p>

<button onclick="finish()">Snack Complete</button>
</div>

<br><br>

<button onclick="goBack()">⬅ Back</button>
<button onclick="resetDay()">Reset Day</button>

<script>

let history = []

function shortWait(){
history.push("mission1")
document.getElementById("mission1").classList.add("hidden")
document.getElementById("mission2").classList.remove("hidden")
}

function longWait(){
history.push("mission1")
document.getElementById("mission1").classList.add("hidden")
document.getElementById("snack1").classList.remove("hidden")
}

function finish(){
alert("Captain chooses next mission!")
}

function goBack(){

let last = history.pop()

if(last=="mission1"){
document.getElementById("mission1").classList.remove("hidden")
document.getElementById("mission2").classList.add("hidden")
document.getElementById("snack1").classList.add("hidden")
}

}

function resetDay(){

history=[]

document.getElementById("mission1").classList.remove("hidden")
document.getElementById("mission2").classList.add("hidden")
document.getElementById("snack1").classList.add("hidden")

}

</script>

</body>
</html>
